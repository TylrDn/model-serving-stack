# Prometheus scrape configs for DCGM exporter and vLLM metrics
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: dcgm_exporter
    static_configs:
      - targets: ["dcgm-exporter:9400"]
    metrics_path: /metrics

  - job_name: vllm_server
    static_configs:
      - targets: ["vllm-server:8000"]
    metrics_path: /metrics

  - job_name: triton_server
    static_configs:
      - targets: ["triton-server:8002"]
    metrics_path: /metrics
