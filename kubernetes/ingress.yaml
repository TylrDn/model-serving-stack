# NGINX Ingress for /v1 routing to vLLM OpenAI-compatible server
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llm-serving-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /vllm(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: vllm-server
                port:
                  number: 8000
          - path: /triton(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: triton-server
                port:
                  number: 8000
