vllm:
  model: meta/llama3-8b-instruct
  tensor_parallel_size: 1
  max_model_len: 8192
  gpu_memory_utilization: 0.90
  dtype: bfloat16
  enable_prefix_caching: true

triton:
  model_repository: /models
  backend: tensorrtllm
  http_port: 8000
  grpc_port: 8001

ray_serve:
  num_replicas: 1
  max_concurrent_queries: 64
  autoscaling:
    min_replicas: 1
    max_replicas: 4
    target_num_ongoing_requests_per_replica: 8
