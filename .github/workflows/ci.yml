name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint deps
        run: pip install ruff mypy

      - name: Lint with ruff
        run: ruff check .

      - name: Install test deps
        run: pip install pytest pytest-cov fastapi httpx pydantic python-dotenv openai

      - name: Run tests
        run: pytest tests/ -v --cov=api --cov=vllm --cov=triton --cov-report=term-missing
