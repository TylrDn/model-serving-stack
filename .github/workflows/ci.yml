name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov pytest-asyncio pyyaml

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: >
          pytest tests/ -v -m "not gpu"
          --cov=api
          --cov=vllm
          --cov=triton
          --cov=evals
          --cov-report=term-missing
          --cov-fail-under=80
